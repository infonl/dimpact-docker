name: Build pabc

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        # renovate: datasource=docker depName=ghcr.io/platform-autorisatie-beheer-component/pabc-api
        default: '1.1.0'

env:
  BUILD_VERSION: ${{ inputs.version }}

permissions:
  packages: write

jobs:
  build-arm64:
    name: Build arm64 image
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out pabc ${{ env.BUILD_VERSION }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Platform-Autorisatie-Beheer-Component/PABC-API
          ref: v${{ env.BUILD_VERSION }}

      - name: Build pabc ${{ env.BUILD_VERSION }} for arm64
        run: |
          docker build --tag ghcr.io/${{ github.repository_owner }}/pabc-api:${{ env.BUILD_VERSION }}-arm64 -f PABC.Server/Dockerfile .
          docker push ghcr.io/${{ github.repository_owner }}/pabc-api:${{ env.BUILD_VERSION }}-arm64
          docker build --tag ghcr.io/${{ github.repository_owner }}/pabc-migrations:${{ env.BUILD_VERSION }}-arm64 -f PABC.MigrationService/Dockerfile .
          docker push ghcr.io/${{ github.repository_owner }}/pabc-migrations:${{ env.BUILD_VERSION }}-arm64

  build-amd64:
    name: Build amd64 image
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out pabc ${{ env.BUILD_VERSION }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Platform-Autorisatie-Beheer-Component/PABC-API
          ref: v${{ env.BUILD_VERSION }}

      - name: Build pabc ${{ env.BUILD_VERSION }} for amd64
        run: |
          docker build --tag ghcr.io/${{ github.repository_owner }}/pabc-api:${{ env.BUILD_VERSION }}-amd64 -f PABC.Server/Dockerfile .
          docker push ghcr.io/${{ github.repository_owner }}/pabc-api:${{ env.BUILD_VERSION }}-amd64
          docker build --tag ghcr.io/${{ github.repository_owner }}/pabc-migrations:${{ env.BUILD_VERSION }}-amd64 -f PABC.MigrationService/Dockerfile .
          docker push ghcr.io/${{ github.repository_owner }}/pabc-migrations:${{ env.BUILD_VERSION }}-amd64

  merge-manifest:
    name: Merge manifest list
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest
        run: |
          docker manifest create ghcr.io/${{ github.repository_owner }}/pabc-api:${{ env.BUILD_VERSION }} \
            ghcr.io/${{ github.repository_owner }}/pabc-api:${{ env.BUILD_VERSION }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/pabc-api:${{ env.BUILD_VERSION }}-arm64
          docker manifest push ghcr.io/${{ github.repository_owner }}/pabc-api:${{ env.BUILD_VERSION }}
          docker manifest create ghcr.io/${{ github.repository_owner }}/pabc-migrations:${{ env.BUILD_VERSION }} \
            ghcr.io/${{ github.repository_owner }}/pabc-migrations:${{ env.BUILD_VERSION }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/pabc-migrations:${{ env.BUILD_VERSION }}-arm64
          docker manifest push ghcr.io/${{ github.repository_owner }}/pabc-migrations:${{ env.BUILD_VERSION }}
