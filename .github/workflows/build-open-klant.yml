name: Build open-klant

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        # renovate: datasource=docker depName=maykinmedia/open-klant
        default: '2.17.1'
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-open-klant.yml

permissions:
  packages: write
  contents: read

jobs:
  determine-version:
    name: Determine version to build
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve version to build
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
          else
            version="$(grep -oP "^\s+default: '\K[^']+" .github/workflows/build-open-klant.yml | head -n 1)"
          fi
          echo "Resolved version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-arm64:
    name: Build arm64 image
    needs: determine-version
    runs-on: ubuntu-24.04-arm
    env:
      BUILD_VERSION: ${{ needs.determine-version.outputs.version }}
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out open-klant ${{ env.BUILD_VERSION }}
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: maykinmedia/open-klant
          ref: ${{ env.BUILD_VERSION }}

      - name: Build open-klant ${{ env.BUILD_VERSION }} for arm64
        run: |
          docker build \
            --tag ghcr.io/${{ github.repository_owner }}/open-klant:${{ env.BUILD_VERSION }}-arm64 \
            --build-arg COMMIT_HASH=${{ steps.checkout.outputs.commit }} \
            --build-arg RELEASE=${{ env.BUILD_VERSION }} \
            .
          docker push ghcr.io/${{ github.repository_owner }}/open-klant:${{ env.BUILD_VERSION }}-arm64

  build-amd64:
    name: Build amd64 image
    needs: determine-version
    runs-on: ubuntu-24.04
    env:
      BUILD_VERSION: ${{ needs.determine-version.outputs.version }}
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out open-klant ${{ env.BUILD_VERSION }}
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: maykinmedia/open-klant
          ref: ${{ env.BUILD_VERSION }}

      - name: Build open-klant ${{ env.BUILD_VERSION }} for amd64
        run: |
          docker build \
            --tag ghcr.io/${{ github.repository_owner }}/open-klant:${{ env.BUILD_VERSION }}-amd64 \
            --build-arg COMMIT_HASH=${{ steps.checkout.outputs.commit }} \
            --build-arg RELEASE=${{ env.BUILD_VERSION }} \
            .
          docker push ghcr.io/${{ github.repository_owner }}/open-klant:${{ env.BUILD_VERSION }}-amd64

  merge-manifest:
    name: Merge manifest list
    needs: [determine-version, build-amd64, build-arm64]
    runs-on: ubuntu-24.04
    env:
      BUILD_VERSION: ${{ needs.determine-version.outputs.version }}
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest
        run: |
          docker manifest create ghcr.io/${{ github.repository_owner }}/open-klant:${{ env.BUILD_VERSION }} \
            ghcr.io/${{ github.repository_owner }}/open-klant:${{ env.BUILD_VERSION }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/open-klant:${{ env.BUILD_VERSION }}-arm64
          docker manifest push ghcr.io/${{ github.repository_owner }}/open-klant:${{ env.BUILD_VERSION }}
